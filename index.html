<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>杜邦座器件与封装生成器</title>
  <link rel="stylesheet" href="styles.css?v=20260714-merge">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>杜邦座器件与 PCB 封装生成器</h1>
      <p>本地网页应用，按网格生成 KiCad 器件与 PCB 封装源文件。</p>
    </div>
    <div class="status-pill" id="projectStatus">未生成</div>
  </header>

  <main id="appLayout" class="layout">
    <aside class="panel setup-panel">
      <h2>器件尺寸</h2>
      <label>
        器件名称
        <input id="partName" type="text" value="DUPONT_GRID" spellcheck="false">
      </label>
      <label>
        名称丝印字号 mm
        <input id="nameSilkFontSizeInput" type="number" min="0.4" step="0.01" value="1">
      </label>
      <div class="field-row">
        <label>
          高度 / 行
          <input id="rowsInput" type="number" min="1" max="40" value="3">
        </label>
        <label>
          宽度 / 列
          <input id="colsInput" type="number" min="1" max="40" value="8">
        </label>
      </div>
      <div class="grid-adjust-grid" aria-label="增减边缘行列">
        <button class="grid-adjust-button" data-grid-action="remove" data-grid-edge="top">减少上</button>
        <button class="grid-adjust-button" data-grid-action="remove" data-grid-edge="bottom">减少下</button>
        <button class="grid-adjust-button" data-grid-action="remove" data-grid-edge="left">减少左</button>
        <button class="grid-adjust-button" data-grid-action="remove" data-grid-edge="right">减少右</button>
        <button class="grid-adjust-button" data-grid-action="add" data-grid-edge="top">增加上</button>
        <button class="grid-adjust-button" data-grid-action="add" data-grid-edge="bottom">增加下</button>
        <button class="grid-adjust-button" data-grid-action="add" data-grid-edge="left">增加左</button>
        <button class="grid-adjust-button" data-grid-action="add" data-grid-edge="right">增加右</button>
      </div>
      <div class="field-row">
        <label>
          孔距 mm
          <input id="pitchInput" type="number" min="0.5" step="0.01" value="2.54">
        </label>
        <label>
          焊盘 mm
          <input id="padInput" type="number" min="0.2" step="0.01" value="1.8">
        </label>
      </div>
      <div class="field-row">
        <label>
          钻孔 mm
          <input id="drillInput" type="number" min="0.1" step="0.01" value="1.0">
        </label>
        <label>
          丝印线宽 mm
          <input id="silkWidthInput" type="number" min="0.05" step="0.01" value="0.15">
        </label>
      </div>
      <div class="checkboxes">
        <label><input id="outlineInput" type="checkbox" checked> 自动生成外框丝印</label>
      </div>
      <div class="field-row">
        <label>
          引脚名丝印
          <select id="pinNameSilkPositionInput">
            <option value="none" selected>不显示</option>
            <option value="top">正上</option>
            <option value="bottom">正下</option>
            <option value="left">正左</option>
            <option value="right">正右</option>
          </select>
        </label>
        <label>
          引脚名字号 mm
          <input id="pinNameSilkFontSizeInput" type="number" min="0.4" step="0.01" value="0.8">
        </label>
      </div>
      <div class="field-row">
        <label>
          左右偏移 mm
          <input id="pinNameSilkOffsetXInput" type="number" step="0.01" value="0" placeholder="左- / 右+">
        </label>
        <label>
          上下偏移 mm
          <input id="pinNameSilkOffsetYInput" type="number" step="0.01" value="0" placeholder="上- / 下+">
        </label>
      </div>
      <label>
        外框丝印距离 mm
        <input id="outlineMarginInput" type="number" min="0" step="0.01" value="1.27">
      </label>
      <div class="checkboxes">
        <label><input id="outlineCustomMarginsInput" type="checkbox"> 分别设置外框四边距离</label>
      </div>
      <div id="outlineMarginsPanel" class="side-options hidden">
        <div class="subtle-label">外框四边距离 mm</div>
        <div class="side-count-grid">
          <label>
            上
            <input id="outlineTopMarginInput" type="number" min="0" step="0.01" placeholder="同上">
          </label>
          <label>
            下
            <input id="outlineBottomMarginInput" type="number" min="0" step="0.01" placeholder="同上">
          </label>
          <label>
            左
            <input id="outlineLeftMarginInput" type="number" min="0" step="0.01" placeholder="同上">
          </label>
          <label>
            右
            <input id="outlineRightMarginInput" type="number" min="0" step="0.01" placeholder="同上">
          </label>
        </div>
      </div>
      <div class="field-row">
        <label>
          器件行数
          <select id="symbolRowsInput">
            <option value="1">单行</option>
            <option value="2" selected>双行</option>
            <option value="4">四行（上/下/左/右）</option>
          </select>
        </label>
        <label>
          每行引脚数
          <input id="symbolPinsPerRowInput" type="number" min="1" max="200" placeholder="自动">
        </label>
      </div>
      <div class="checkboxes">
        <label><input id="symbolMirrorInput" type="checkbox"> 器件左右镜像</label>
        <label><input id="symbolFlipInput" type="checkbox"> 器件上下翻转</label>
      </div>
      <div id="symbolFourOptions" class="side-options hidden">
        <div class="subtle-label">四行引脚数</div>
        <div class="side-count-grid">
          <label>
            上
            <input id="symbolTopPinsInput" type="number" min="1" max="200" placeholder="自动">
          </label>
          <label>
            下
            <input id="symbolBottomPinsInput" type="number" min="1" max="200" placeholder="自动">
          </label>
          <label>
            左
            <input id="symbolLeftPinsInput" type="number" min="1" max="200" placeholder="自动">
          </label>
          <label>
            右
            <input id="symbolRightPinsInput" type="number" min="1" max="200" placeholder="自动">
          </label>
        </div>
      </div>
      <h2>批量操作</h2>
      <div class="button-grid">
        <button id="enableAllButton">全部启用</button>
        <button id="disableAllButton">全部禁用</button>
        <button id="autoNumberButton">自动编号</button>
        <button id="clearNamesButton">清空命名</button>
      </div>
      <h2>批量引脚丝印</h2>
      <label>
        引脚编号
        <input id="bulkPinStylePinsInput" type="text" placeholder="例如 1,2,5-8" spellcheck="false">
      </label>
      <div class="field-row">
        <label>
          位置
          <select id="bulkPinNameSilkPositionInput">
            <option value="none">不显示</option>
            <option value="top" selected>正上</option>
            <option value="bottom">正下</option>
            <option value="left">正左</option>
            <option value="right">正右</option>
          </select>
        </label>
        <label>
          字号 mm
          <input id="bulkPinNameSilkFontSizeInput" type="number" min="0.4" step="0.01" value="0.8">
        </label>
      </div>
      <div class="field-row">
        <label>
          左右偏移 mm
          <input id="bulkPinNameSilkOffsetXInput" type="number" step="0.01" value="0" placeholder="左- / 右+">
        </label>
        <label>
          上下偏移 mm
          <input id="bulkPinNameSilkOffsetYInput" type="number" step="0.01" value="0" placeholder="上- / 下+">
        </label>
      </div>
      <div class="bulk-action-grid">
        <button id="useSelectedPinStyleButton">选择当前引脚为模版</button>
        <button id="applyPinStyleButton">应用到指定引脚</button>
      </div>

      <h2>项目文件</h2>
      <div class="button-grid">
        <button id="saveProjectButton">保存项目 JSON</button>
        <label class="file-button">
          导入项目 JSON
          <input id="projectFileInput" type="file" accept="application/json,.json">
        </label>
      </div>
    </aside>

    <div class="column-resizer" data-resizer="left" role="separator" aria-label="调整左栏和中间栏宽度"></div>

    <section class="workspace">
      <div class="toolbar">
        <div class="mode-group" role="group" aria-label="编辑模式">
          <button class="mode-button active" data-mode="select">选择</button>
          <button class="mode-button" data-mode="line">线</button>
          <button class="mode-button" data-mode="rect">矩形</button>
          <button class="mode-button" data-mode="text">文本</button>
        </div>
        <label class="text-inline">
          丝印文本
          <input id="silkTextInput" type="text" value="J1" spellcheck="false">
        </label>
        <button id="undoSilkButton">撤销丝印</button>
      </div>

      <div class="surface-wrap">
        <div id="gridSurface" class="grid-surface" aria-label="器件网格">
          <div id="cellGrid" class="cell-grid"></div>
          <svg id="silkSvg" class="silk-svg" aria-label="丝印绘制层"></svg>
        </div>
      </div>
    </section>

    <div class="column-resizer" data-resizer="right" role="separator" aria-label="调整中间栏和右栏宽度"></div>

    <aside class="panel inspector-panel">
      <h2>当前格子</h2>
      <div id="emptySelection" class="empty-state">点击格子启用或选择。</div>
      <div id="cellInspector" class="cell-inspector hidden">
        <div class="selected-cell-title" id="selectedCellTitle"></div>
        <label>
          引脚编号
          <input id="pinNumberInput" type="text" spellcheck="false">
        </label>
        <label>
          引脚名称
          <input id="pinNameInput" type="text" placeholder="例如 VCC / GND / RX" spellcheck="false">
        </label>
        <div class="field-row">
          <label>
            引脚名丝印
            <select id="cellPinNameSilkPositionInput">
              <option value="none">不显示</option>
              <option value="top">正上</option>
              <option value="bottom">正下</option>
              <option value="left">正左</option>
              <option value="right">正右</option>
            </select>
          </label>
          <label>
            丝印字号 mm
            <input id="cellPinNameSilkFontSizeInput" type="number" min="0.4" step="0.01">
          </label>
        </div>
        <div class="field-row">
          <label>
            左右偏移 mm
            <input id="cellPinNameSilkOffsetXInput" type="number" step="0.01" placeholder="左- / 右+">
          </label>
          <label>
            上下偏移 mm
            <input id="cellPinNameSilkOffsetYInput" type="number" step="0.01" placeholder="上- / 下+">
          </label>
        </div>
        <label class="checkbox-line">
          <input id="cellEnabledInput" type="checkbox">
          启用这个杜邦母座焊孔
        </label>
      </div>

      <h2>生成结果</h2>
      <dl class="stats">
        <div><dt>总格子</dt><dd id="totalCellsStat">0</dd></div>
        <div><dt>启用焊孔</dt><dd id="activeCellsStat">0</dd></div>
        <div><dt>丝印图元</dt><dd id="silkStat">0</dd></div>
      </dl>

      <h2>器件预览</h2>
      <div class="symbol-preview-wrap">
        <svg id="symbolPreview" class="symbol-preview" aria-label="KiCad 器件预览"></svg>
      </div>

      <h2>PCB 预览</h2>
      <div class="pcb-preview-wrap">
        <svg id="pcbPreview" class="pcb-preview" aria-label="KiCad PCB 封装预览"></svg>
      </div>

      <h2>导出</h2>
      <div class="export-list">
        <button id="downloadKicadZip" class="primary">KiCad 源文件 ZIP</button>
        <button id="downloadKicadPcb">KiCad PCB</button>
        <button id="downloadKicadSch">KiCad SCH</button>
      </div>
    </aside>
  </main>

  <script src="app.js?v=20260721-kicad-sch-fix"></script>
</body>
</html>
